<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ T('Email Client - Login') }}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">&#9993;</div>
        <h1>{{ T('Email Client') }}</h1>
        <p class="login-subtitle">{{ T('Web-based multi-account email client') }}</p>
      </div>
      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">{{ T('Username') }}</label>
          <input type="text" id="username" name="username" placeholder="{{ T('Enter username') }}" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">{{ T('Password') }}</label>
          <input type="password" id="password" name="password" placeholder="{{ T('Enter password') }}" required>
        </div>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-block">{{ T('Sign In') }}</button>
      </form>
      <div class="login-footer">
        <p>{{ T('Port') }}: {{ port }}</p>
      </div>
    </div>
  </div>
  <script>window._LOCALE = {{ locale_json|safe }};</script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
